name: Release Windows

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version '
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: SpcPit

      - name: Checkout MapleKiosk dependency
        uses: actions/checkout@v4
        with:
          repository: EricNgo1972/MapleKiosk
          token: ${{ secrets.MAPLEKIOSK_REPO_TOKEN }}
          path: spc-maplekiosk/MapleKiosk

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Set runtime ID
        id: rid
        run: |
          echo "rid=win-x64" >> "$GITHUB_OUTPUT"
          echo "ext=zip" >> "$GITHUB_OUTPUT"

      - name: Publish
        working-directory: SpcPit
        run: |
          dotnet publish Main/Main.csproj \
            -c Release \
            -r ${{ steps.rid.outputs.rid }} \
            --self-contained true \
            -o ./publish

      - name: Package (Windows)
        working-directory: SpcPit
        run: cd ./publish && zip -r ../spc-pit-win-x64.zip .

      - name: Create GitHub Release
        working-directory: SpcPit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ inputs.version }}"
          ASSET="spc-pit-win-x64.zip"
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG exists - uploading asset to existing release..."
            gh release upload "$TAG" "$ASSET" --clobber
          else
            gh release create "$TAG" "$ASSET" \
              --title "SPC PIT $TAG (windows)" \
              --notes "Release $TAG for windows-x64"
          fi
